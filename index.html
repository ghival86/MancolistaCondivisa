<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogo Schede Telefoniche</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f2ee}
header{background:#2d4a22;color:#fff;padding:12px 20px}
.container{padding:16px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
input,select{padding:8px}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.card{background:#fff;padding:10px;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px}
th{cursor:pointer;background:#eee}
.chk{font-weight:bold;text-align:center}
</style>
</head>
<body>
<header><h2>Catalogo Schede Telefoniche</h2></header>
<div class="container">
<div class="stats">
<div class="card">Totale: <span id="tot">0</span></div>
<div class="card">Andrea: <span id="andreaCount">0</span></div>
<div class="card">Stefano: <span id="stefanoCount">0</span></div>
<div class="card">Valerio: <span id="valerioCount">0</span></div>
</div>

<div class="filters">
<input id="search" placeholder="Cerca...">
<select id="genere"><option value="">Tutti i generi</option></select>
<select id="sottogenere"><option value="">Tutti i sottogeneri</option></select>
<select id="mancolista">
<option value="">Tutti</option>
<option value="andrea">Mancolista Andrea</option>
<option value="stefano">Mancolista Stefano</option>
<option value="valerio">Mancolista Valerio</option>
</select>
</div>

<table>
<thead>
<tr>
<th>Genere</th>
<th>Sottogenere</th>
<th>Golden</th>
<th>C&amp;C</th>
<th>Titolo</th>
<th>Taglio</th>
<th>Scadenza</th>
<th>Produttore</th>
<th>Andrea</th>
<th>Stefano</th>
<th>Valerio</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
const SHEET_ID="1ccdHVpTI4Ki-TslQz8R-Rs2gfN_NoZMJj9yhsjGZMRY";
const SHEET_NAME="Collezione schede - VOL 2"; // modifica se il foglio ha un nome diverso
let data=[];

async function loadData(){
 const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
 const txt=await fetch(url).then(r=>r.text());
 const json=JSON.parse(txt.match(/setResponse\\((.*)\\);?$/s)[1]);
 data=json.table.rows.map(r=>({
   genere:r.c[0]?.v||"",
   sottogenere:r.c[1]?.v||"",
   golden:r.c[2]?.v||"",
   cc:r.c[3]?.v||"",
   titolo:r.c[4]?.v||"",
   taglio:r.c[5]?.v||"",
   emissione:r.c[6]?.v||"",
   scadenza:r.c[7]?.v||"",
   produttore:r.c[8]?.v||"",
   note:r.c[9]?.v||"",
   valNuova:r.c[10]?.v||"",
   valUsata:r.c[11]?.v||"",
   andrea:!!r.c[12]?.v,
   stefano:!!r.c[13]?.v,
   valerio:!!r.c[14]?.v
 }));
 buildFilters();
 updateStats();
 render();
}

function buildFilters(){
 const g=[...new Set(data.map(x=>x.genere).filter(Boolean))].sort();
 const s=[...new Set(data.map(x=>x.sottogenere).filter(Boolean))].sort();
 genere.innerHTML='<option value="">Tutti i generi</option>'+g.map(v=>`<option>${v}</option>`).join('');
 sottogenere.innerHTML='<option value="">Tutti i sottogeneri</option>'+s.map(v=>`<option>${v}</option>`).join('');
}

function updateStats(){
 tot.textContent=data.length;
 andreaCount.textContent=data.filter(x=>x.andrea).length;
 stefanoCount.textContent=data.filter(x=>x.stefano).length;
 valerioCount.textContent=data.filter(x=>x.valerio).length;
}

function render(){
 const q=search.value.toLowerCase();
 const g=genere.value;
 const s=sottogenere.value;
 const m=mancolista.value;

 const rows=data.filter(r=>{
  if(g && r.genere!==g) return false;
  if(s && r.sottogenere!==s) return false;

  if(m==="andrea" && r.andrea) return false;
  if(m==="stefano" && r.stefano) return false;
  if(m==="valerio" && r.valerio) return false;

  if(q){
   const txt=(Object.values(r).join(" ")).toLowerCase();
   if(!txt.includes(q)) return false;
  }
  return true;
 });

 tbody.innerHTML=rows.map(r=>`
 <tr>
 <td>${r.genere}</td>
 <td>${r.sottogenere}</td>
 <td>${r.golden}</td>
 <td>${r.cc}</td>
 <td>${r.titolo}</td>
 <td>${r.taglio}</td>
 <td>${r.scadenza}</td>
 <td>${r.produttore}</td>
 <td class="chk">${r.andrea?'✓':''}</td>
 <td class="chk">${r.stefano?'✓':''}</td>
 <td class="chk">${r.valerio?'✓':''}</td>
 </tr>`).join("");
}

["search","genere","sottogenere","mancolista"].forEach(id=>{
 document.addEventListener("change",e=>{if(e.target.id===id)render();});
});
search.addEventListener("input",render);

loadData().catch(err=>alert("Errore caricamento: "+err));
</script>
</body>
</html>
